name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './app/package-lock.json'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build Vite app
        working-directory: ./app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./app
          production: true

      - name: Notify Deployment Success
        run: echo "✅ Frontend deployed to Vercel"

  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/HikmahHUB.ng
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            sleep 5

      - name: Health Check
        run: |
          for i in {1..30}; do
            if curl -sf https://api.hikmahhub.com/api/health > /dev/null 2>&1; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - waiting for backend to be ready..."
            sleep 5
          done
          echo "❌ Backend health check failed"
          exit 1
        continue-on-error: true

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Both frontend and backend deployed successfully!"
          echo "Frontend: https://hikmahhub.vercel.app"
          echo "Backend: https://api.hikmahhub.com"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
