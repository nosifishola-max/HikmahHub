name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          working-directory: ./app

      - name: Notify Deployment
        run: echo "✅ Frontend deployed to Vercel"

  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/HikmahHUB.ng
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker-compose logs -f backend &
            sleep 10

      - name: Health Check
        run: |
          for i in {1..30}; do
            if curl -f https://api.yourdomain.com/api/health; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - waiting for backend to be ready..."
            sleep 5
          done
          echo "❌ Backend health check failed"
          exit 1
        continue-on-error: true

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Both frontend and backend deployed successfully!"
          echo "Frontend: https://yourdomain.vercel.app"
          echo "Backend: https://api.yourdomain.com"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
